# PostgreSQL + pgvector 本地开发
# 启动: docker compose up -d
# 停止: docker compose down
services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: neodev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neodev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 首次启动后自动创建 vector 扩展（可选，也可在连接后手动 CREATE EXTENSION vector）
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
      - ./docker/migrations/001_impact_analysis_tables.sql:/docker-entrypoint-initdb.d/002_impact_analysis_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
