# PostgreSQL + pgvector 本地开发
# 启动: docker compose up -d
# 停止: docker compose down
services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: neodev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neodev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 首次启动后自动创建 vector 扩展（可选，也可在连接后手动 CREATE EXTENSION vector）
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
      - ./docker/migrations/001_impact_analysis_tables.sql:/docker-entrypoint-initdb.d/002_impact_analysis_tables.sql:ro
      - ./docker/migrations/002_versions_branch_nullable.sql:/docker-entrypoint-initdb.d/003_versions_branch_nullable.sql:ro
      - ./docker/migrations/003_git_branches.sql:/docker-entrypoint-initdb.d/004_git_branches.sql:ro
      - ./docker/migrations/004_project_repo_auth.sql:/docker-entrypoint-initdb.d/005_project_repo_auth.sql:ro
      - ./docker/migrations/006_ai_preprocess_status.sql:/docker-entrypoint-initdb.d/006_ai_preprocess_status.sql:ro
      - ./docker/migrations/007_ai_agent_tables.sql:/docker-entrypoint-initdb.d/007_ai_agent_tables.sql:ro
      - ./docker/migrations/008_product_refactoring.sql:/docker-entrypoint-initdb.d/008_product_refactoring.sql:ro
      - ./docker/migrations/009_version_required.sql:/docker-entrypoint-initdb.d/009_version_required.sql:ro
      - ./docker/migrations/010_project_repo_url.sql:/docker-entrypoint-initdb.d/010_project_repo_url.sql:ro
      - ./docker/migrations/011_agent_conversation_enhancements.sql:/docker-entrypoint-initdb.d/011_agent_conversation_enhancements.sql:ro
      - ./docker/migrations/012_impact_analysis_enhancements.sql:/docker-entrypoint-initdb.d/012_impact_analysis_enhancements.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
