# NeoDev 全栈部署
#
# ── 开发环境（有源码）──────────────────────────────────────────────
#   docker compose up -d --build
#
# ── 内网部署（只有 tar + 此文件 + .env）────────────────────────────
#   docker load -i neodev-all-images.tar
#   docker compose up -d
#
# 停止: docker compose down
# 清除数据: docker compose down -v

services:
  # ── PostgreSQL + pgvector（SQL 迁移已内置于镜像）─────────────────
  postgres:
    image: neodev-postgres:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: neodev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-neodev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Neo4j 图数据库 ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: neodev-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password123} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── FastAPI 后端 ────────────────────────────────────────────────
  api:
    image: neodev-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neodev-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@neodev-postgres:5432/neodev"
      NEO4J_URI: "bolt://neodev-neo4j:7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      REPO_CLONE_BASE: /data/repos
      AGENT_SANDBOX_ROOT: /data/sandboxes
    volumes:
      - repo_data:/data/repos
      - sandbox_data:/data/sandboxes
    expose:
      - "8000"

  # ── Nginx 前端 + API 反向代理 ──────────────────────────────────
  web:
    image: neodev-web:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: neodev-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
    name: neodev-postgres-data
  neo4j_data:
    name: neodev-neo4j-data
  neo4j_logs:
    name: neodev-neo4j-logs
  repo_data:
    name: neodev-repo-data
  sandbox_data:
    name: neodev-sandbox-data