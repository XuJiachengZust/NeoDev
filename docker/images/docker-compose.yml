# NeoDev 内网部署
# 前置: docker load -i neodev-all-images.tar
# 启动: docker compose up -d
# 停止: docker compose down
# 清除数据: docker compose down -v
# 可选: 同目录放 .env 配置 OPENAI_API_KEY 等，否则用下方默认值

services:
  postgres:
    image: neodev-postgres:latest
    container_name: neodev-postgres
    restart: unless-stopped
    shm_size: "256mb"
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neodev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: neodev-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    image: neodev-api:latest
    container_name: neodev-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/neodev"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      REPO_CLONE_BASE: /data/repos
      AGENT_SANDBOX_ROOT: /data/sandboxes
      REQUIREMENT_DOCS_ROOT: /data/requirement_docs
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-key}
      OPENAI_BASE: ${OPENAI_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL_CHAT: ${OPENAI_MODEL_CHAT:-deepseek-v3.2}
      OPENAI_MODEL_EMBEDDING: ${OPENAI_MODEL_EMBEDDING:-text-embedding-v3}
      AI_ANALYSIS_MAX_WORKERS: ${AI_ANALYSIS_MAX_WORKERS:-5}
    volumes:
      - repo_data:/data/repos
      - sandbox_data:/data/sandboxes
      - doc_data:/data/requirement_docs
    expose:
      - "8000"

  web:
    image: neodev-web:latest
    container_name: neodev-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: neodev-postgres-data
  neo4j_data:
    name: neodev-neo4j-data
  neo4j_logs:
    name: neodev-neo4j-logs
  repo_data:
    name: neodev-repo-data
  sandbox_data:
    name: neodev-sandbox-data
  doc_data:
    name: neodev-doc-data
